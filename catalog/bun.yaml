schemaVersion: "1.0.0"
id: "bun"
name: "Bun"
description: "Fast all-in-one JavaScript runtime and toolkit"
homepage: "https://bun.sh"
tags:
  - runtime
  - javascript
  - package-manager

versionSource:
  type: githubReleases
  repo: oven-sh/bun

assets:
  - platform: win
    arch: x64
    url: "https://github.com/oven-sh/bun/releases/download/bun-v{version}/bun-windows-x64.zip"
    type: zip

  - platform: win
    arch: arm64
    url: "https://github.com/oven-sh/bun/releases/download/bun-v{version}/bun-windows-aarch64.zip"
    type: zip

  - platform: mac
    arch: x64
    url: "https://github.com/oven-sh/bun/releases/download/bun-v{version}/bun-darwin-x64.zip"
    type: zip

  - platform: mac
    arch: arm64
    url: "https://github.com/oven-sh/bun/releases/download/bun-v{version}/bun-darwin-aarch64.zip"
    type: zip

install:
  type: archive
  requiresAdmin: false
  targetDir: "{managed}/bun/{version}"
  postInstall:
    - type: addToPath
      value: "{targetDir}"

validate:
  command: "bun --version"
  parse: semver
