schemaVersion: "1.0.0"
id: "go"
name: "Go"
description: "Go programming language toolchain"
homepage: "https://go.dev"
tags:
  - language
  - runtime
  - backend

versionSource:
  type: staticList
  versions:
    - "1.22.5"
    - "1.21.12"
    - "1.20.14"

assets:
  - platform: win
    arch: x64
    url: "https://go.dev/dl/go{version}.windows-amd64.zip"
    type: zip

  - platform: win
    arch: arm64
    url: "https://go.dev/dl/go{version}.windows-arm64.zip"
    type: zip

  - platform: mac
    arch: x64
    url: "https://go.dev/dl/go{version}.darwin-amd64.tar.gz"
    type: tar.gz

  - platform: mac
    arch: arm64
    url: "https://go.dev/dl/go{version}.darwin-arm64.tar.gz"
    type: tar.gz

install:
  type: archive
  requiresAdmin: false
  targetDir: "{managed}/go/{version}"
  postInstall:
    - type: addToPath
      value: "{targetDir}/go/bin"

validate:
  command: "go version"
  parse: regex
  pattern: "go([\\d.]+)"
